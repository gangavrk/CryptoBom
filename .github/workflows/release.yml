name: release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds platform binaries on native runners (cgo can't easily cross-compile),
# publishes a GitHub Release with checksums, and pushes a versioned image to GHCR.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

jobs:
  binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: macos-13, goos: darwin, goarch: amd64 }
          - { runner: macos-14, goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          name="cryptobom-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/cryptobom/cryptobom/internal/version.Version=${GITHUB_REF_NAME}" \
            -o cryptobom ./cmd/cryptobom
          mkdir -p "dist/${name}"
          cp cryptobom LICENSE README.md "dist/${name}/"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"

      - uses: actions/upload-artifact@v4
        with:
          name: cryptobom-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: cd dist && sha256sum *.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  homebrew:
    # Render the formula from the release tarballs and publish it to the tap.
    # Enable by setting two repo settings:
    #   - secret HOMEBREW_TAP_TOKEN: a PAT with push access to the tap repo
    #   - variable HOMEBREW_TAP_REPO: the tap, e.g. "your-org/homebrew-tap"
    # When unset, the formula is still rendered (a dry run) but not pushed, so a
    # release never fails just because the tap isn't configured yet.
    needs: release
    runs-on: ubuntu-latest
    env:
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Render formula
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          sha() { sha256sum "dist/cryptobom-${tag}-$1.tar.gz" | cut -d' ' -f1; }
          sed \
            -e "s|__REPO__|${GITHUB_REPOSITORY}|g" \
            -e "s|__VERSION__|${version}|g" \
            -e "s|__SHA_DARWIN_ARM64__|$(sha darwin-arm64)|g" \
            -e "s|__SHA_DARWIN_AMD64__|$(sha darwin-amd64)|g" \
            -e "s|__SHA_LINUX_AMD64__|$(sha linux-amd64)|g" \
            packaging/homebrew/cryptobom.rb > rendered-cryptobom.rb
          echo "--- rendered Formula/cryptobom.rb ---"
          cat rendered-cryptobom.rb

      - name: Publish to tap
        if: ${{ env.TAP_TOKEN != '' && env.TAP_REPO != '' }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp rendered-cryptobom.rb tap/Formula/cryptobom.rb
          cd tap
          git add Formula/cryptobom.rb
          if git diff --cached --quiet; then
            echo "formula unchanged; nothing to publish"
            exit 0
          fi
          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "cryptobom ${GITHUB_REF_NAME}"
          git push

  image:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercased)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
