name: release

# Triggered by pushing a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# Builds platform binaries on native runners (cgo can't easily cross-compile),
# publishes a GitHub Release with checksums, and pushes a versioned image to GHCR.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  packages: write # push the image to GHCR

jobs:
  binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: macos-13, goos: darwin, goarch: amd64 }
          - { runner: macos-14, goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          name="cryptobom-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          go build -trimpath \
            -ldflags "-s -w -X github.com/cryptobom/cryptobom/internal/version.Version=${GITHUB_REF_NAME}" \
            -o cryptobom ./cmd/cryptobom
          mkdir -p "dist/${name}"
          cp cryptobom LICENSE README.md "dist/${name}/"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"

      - uses: actions/upload-artifact@v4
        with:
          name: cryptobom-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: cd dist && sha256sum *.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

  image:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image name (lowercased)
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:latest
