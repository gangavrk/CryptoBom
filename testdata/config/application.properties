# Spring Boot TLS configuration sample for cryptobom regression testing.
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
# Deprecated protocol — flagged.
server.ssl.enabled-protocols=TLSv1.1,TLSv1.2
# Weak cipher suite — flagged. Modern one alongside is not.
server.ssl.ciphers=TLS_RSA_WITH_RC4_128_SHA,TLS_AES_128_GCM_SHA256
